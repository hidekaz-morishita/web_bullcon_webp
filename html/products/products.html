<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>製品一覧 | Bullcon - フジ電機工業株式会社</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/header.css">
    <link rel="stylesheet" href="../../css/footer.css">
    <link rel="stylesheet" href="../../css/products/products.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="header-placeholder"></div>

<main>
    <div class="container">
        <h2 class="section-title">
                <span class="section-title-en">PRODUCTS</span>
                <span class="section-title-jp">製品一覧</span>
            </h2>
        <div id="mobile-category-menu" class="mobile-menu-container">
            <button id="mobile-menu-toggle-btn" class="mobile-menu-toggle"></button>
            <div class="mobile-menu-header">
                <h3 class="mobile-menu-title">カテゴリ</h3>
                <button id="close-menu-btn" class="close-menu-btn">&times;</button>
            </div>
            <ul id="mobile-category-list" class="mobile-category-list">
            </ul>
        </div>
        <div class="mobile-menu-overlay"></div>

        <div class="products-container">
            <aside class="products-sidebar">
                <h2 class="sidebar-title">カテゴリから探す</h2>
                <nav class="products-nav">
                    <ul id="category-list" class="category-list">
                    </ul>
                </nav>
            </aside>

            <section class="products-content">
                <div id="product-list" class="product-list-container">
                    <div class="product-grid">
                    </div>
                </div>
            </section>
        </div>
    </div>
</main>

<div id="footer-placeholder"></div>

<script src="../../js/header.js"></script>
<script src="../../js/footer.js"></script>
<script src="../../js/products/products.js"></script>

</body>
</html>
