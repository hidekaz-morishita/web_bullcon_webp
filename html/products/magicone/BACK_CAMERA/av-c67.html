<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マジコネ AV-C67 / Bullcon-フジ電機工業株式会社</title>
    <link rel="stylesheet" href="../../../../css/style.css">
    <link rel="stylesheet" href="../../../../css/header.css">
    <link rel="stylesheet" href="../../../../css/footer.css">
    <link rel="stylesheet" href="../../../../css/products/products_list_sidebar.css">
    <link rel="stylesheet" href="../../../../css/products/MAGICONE/av_base.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div id="container" class="container">
            <section class="magicone-head">
                <img src="../../../../images/products/MAGICONE/magicone_logo.gif" alt="ロゴ" class="magicone_logo">
                <img src="../../../../images/products/MAGICONE/guarantee_1Y-psv_12V.gif" alt="保証/電源電圧" class="guarantee_1Y-psv_12V">
            </section>
            <section class="product-info">
                <div class="product-info-main">
                    <h1 class="product-info-title">ＡＶ－Ｃ６７</h1>
                    <div class="product-info-details">
                        <p class="product-info-price">
                            <span class="product-info-price-text">販売価格</span>
                            <span class="product-info-price-value">￥３,２７８</span>
                            <span class="product-info-price-tax">（税込）</span>
                            <br>
                            <span class="product-info-price-untaxed">（税抜価格 ￥２,９８０）</span>
                        </p>
                        <p class="product-info-jan-code">ＪＡＮコード：４９５００９４０６３５１０</p>
                    </div>
                </div>

                <div class="product-info-compat">
                    <p class="product-info-compat-car">
                        スズキ ： ディーラーオプション　バックアイカメラ装着車
                    </p>
                    <p class="product-info-compat-unit">
                        バックカメラ接続ユニット　●ディーラーオプションバックアイカメラのカメラ映像を出力出来ます。
                    </p>
                    <p class="product-info-compat-red-text">
                        <b>バック映像には固定式ガイド線が表示されますが、バックアイカメラ搭載機能のため消去はできません。</b>
                    </p>
                </div>
            </section>
            
            <div class="pdf-button-wrapper">
                <a href="../../../../pdf/products/MAGICONE/AV-C67.pdf" target="_blank" class="pdf-button">
                    <img src="../../../../images/common/pdf_icon.webp" alt="PDF取扱説明書" class="button-icon">
                    <span class="button-text">取付・取扱説明書ダウンロード</span>
                </a>
            </div>
            
            <section class="connection-guid">
                <div class="connection-guid-txt">
                    <span class="txt-1">市販ナビゲーションへ接続</span>
                    <span class="txt-2">(ナビゲーションシステムのバックカメラ入力に後方映像を出力することができます。)</span>
                </div>
                <div class="guid-images">
                    <img src="../../../../images/products/MAGICONE/BACK_CAMERA/AV-C67/product_img_1.gif" alt="AV-C66製品画像1" class="product-media-image_1">
                    <img src="../../../../images/products/MAGICONE/BACK_CAMERA/AV-C67/product_img_2.gif" alt="AV-C66製品画像2" class="product-media-image_2">
                    <div class="img-with-txt">
                        <img src="../../../../images/products/MAGICONE/BACK_CAMERA/AV-C67/product_img_3.gif" alt="AV-C66製品画像3" class="product-media-image_3">
                        <p class="anotate-txt">※ガイド線は消去できません</p>
                    </div>
                </div>
                
            </section>
        </div>
    </main>

    <div id="footer-placeholder"></div>

<script src="../../../../js/header.js"></script>
<script src="../../../../js/products/products_list_sidebar_modan.js"></script>
<script src="../../../../js/footer.js"></script>

</body>
</html>
