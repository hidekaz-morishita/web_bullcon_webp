<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車種適合検索</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/header.css">
    <link rel="stylesheet" href="../../css/footer.css">
    <link rel="stylesheet" href="../../css/match_accessory/match.css">
</head>
<body>
    <div id="header-placeholder"></div>
    <main>
        <div class="container">
            <div class="match-container">
                <h2 class="section-title">
                    <span class="section-title-en">CONFORMITY INSPECTION</span>
                    <span class="section-title-jp">車種適合検索</span>
                </h2>
                <div class="annotation">
                    <p>当適合表は細心の注意を払って作成しておりますが、すべての車種・年式・グレードに対応しているわけではありません。また、車両の仕様変更や改良により、記載内容が最新の情報と異なる場合もございます。</p>
                    <p>製品の取り付けやご購入の際は、必ず現車にて適合をご確認いただくか、お近くの販売店またはディーラー様にご相談ください。</p>
                    <p>本適合表の内容は、あくまで参考情報としてご利用ください。</p>
                    <p>※リストに存在しない製品については、お手数おかけしますが <a href="./match_pdf.html">製品適合表 (PDF)</a> にてPDFを直接ご確認ください。</p>
                </div>
                <div class="content-wrapper">
                    <div class="form-area" id="form-container"></div>
                    <button id="exportPdfButton" style="display: none;" disabled>検索結果をPDFで出力</button>
                    <div id="result" class="result-area">
                        <p id="message-container">検索結果がここに表示されます。</p>
                        <div id="results-table-container" style="display: none;">
                            <table class="result-table">
                                <thead></thead>
                                <tbody></tbody>
                            </table>
                        </div>
                        <div id="pdf-link-container"></div>
                        <div id="notes-list-container"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div id="footer-placeholder"></div>
    <script src="../../js/header.js"></script>
    <script src="../../js/footer.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script type="module" src="../../js/match_accessory/match.js"></script>
    <script type="module" src="../../js/match_accessory/form_ui.js"></script>
</body>
</html>
