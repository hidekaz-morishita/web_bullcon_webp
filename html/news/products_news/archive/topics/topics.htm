<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>製品新着情報-アーカイブ | Bullcon - フジ電機工業株式会社</title>
  <link rel="stylesheet" href="../../../../../css/style.css">
  <link rel="stylesheet" href="../../../../../css/header.css">
  <link rel="stylesheet" href="../../../../../css/footer.css">
  <style>

.news-container {
    width: 1000px;
    max-width: 100%;
    margin: 0 auto;
}

/* 上下セパレータ画像の代替 */
.separator-top {
    height: 28px;
    width: 100%;
}
.separator-bottom {
    height: 6px;
    width: 100%;
}

/* メインの二段組みレイアウト */
.news-content-layout {
    display: flex;
    gap: 8px;
}

.column-title-car,
.column-title-av {
  text-align: center;
  font-weight: bold;
  font-size: var(--font-size-h4);
}

.column-title-car {
  background-color: rgb(197, 252, 252);
}

.column-title-av {
  background-color: rgb(250, 214, 244);
}

/* 左右のカラム */
.news-column {
    width: 496px; /* 490px (iframe) + 4px (端の画像) + 2px(パディングなど) で近似 */
    flex-shrink: 0;
}
.left-column {
    padding-left: 4px; /* topics_r14_c1.webp の幅 4px */
}
.right-column {
    padding-right: 4px; /* topics_r14_c14.webp の幅 4px */
}

/* iframeのスタイル */
.news-iframe {
    width: 490px; /* 元の幅を維持 */
    height: 1650px; /* 元の高さを維持 */
    display: block;
}

/* レスポンシブ対応 (例: 画面幅が1000px以下になったら縦に積む) */
@media (max-width: 1000px) {
    .news-container {
        width: 100%; /* 幅を画面いっぱいに広げる */
        padding: 0 10px; /* 左右に少し余白を設ける */
    }
    .news-content-layout {
        flex-direction: column; /* 縦に積む */
        gap: 20px;
    }
    .news-column {
        width: 100%;
        padding-left: 0;
        padding-right: 0;
    }
    .news-iframe {
        width: 100%; /* iframeも幅いっぱいに広げる */
        height: 1000px; /* モバイルで見やすいよう高さを調整（適宜変更） */
    }
}
  </style>
</head>

<body>
    <div id="header-placeholder"></div>

    <div class="container">
      <main class="page-content">
          <h2 class="section-title">
              <span class="section-title-en">PRODUCT NEWS-ARCHIVE</span>
              <span class="section-title-jp">製品新着情報-アーカイブ</span>
          </h2>

          <div class="news-container">

              <div class="separator-top"></div>

              <div class="news-content-layout">

                  <div class="news-column left-column">
                      <div class="column-title-car">カーアクセサリー</div>
                      <iframe src="./what'snew_sa/index_sa.html" name="fuji_denki_sa" 
                              scrolling="yes" frameborder="0" class="news-iframe">
                          <p>このページはインラインフレーム対応のブラウザでご覧下さい。</p>
                      </iframe>
                  </div>

                  <div class="news-column right-column">
                    <div class="column-title-av">AVアクセサリー</div>
                      <iframe src="./what'snew_tv/index_tv.html" name="fuji_denki_tv" 
                              scrolling="yes" frameborder="0" class="news-iframe">
                          <p>このページはインラインフレーム対応のブラウザでご覧下さい。</p>
                      </iframe>
                  </div>

              </div>

              <div class="separator-bottom"></div>

          </div>
      </main>
    </div>

    <div id="footer-placeholder"></div>
</body>
<script src="../../../../../js/header.js"></script>
<script src="../../../../../js/footer.js"></script>
</html>
