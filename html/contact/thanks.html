<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>送信完了 | Bullcon - フジ電機工業株式会社</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/header.css">
    <link rel="stylesheet" href="../../css/footer.css">
    <style>
        .thanks-container {
            text-align: center;
            padding: 80px 20px;
        }

        .thanks-title {
            font-size: 2rem;
            color: var(--color-accent-3);
            margin-bottom: 30px;
        }

        .thanks-text {
            line-height: 1.8;
            margin-bottom: 40px;
        }

        .back-link {
            display: inline-block;
            padding: 12px 40px;
            background-color: var(--color-link-text);
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        .back-link:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="container thanks-container">
            <h1 class="thanks-title">送信が完了いたしました</h1>
            <div class="thanks-text">
                <p>お問い合わせいただき、誠にありがとうございます。</p>
                <p>後ほど、担当者よりメールまたはお電話にてご連絡させていただきます。<br>
                    なお、お問い合わせ内容によっては数日お時間をいただく場合がございます。あらかじめご了承ください。</p>
                <p>※1週間以上経過しても返信がない場合は、お手数ですがお電話にてお問い合わせください。</p>
            </div>
            <a href="../../index.html" class="back-link">トップページへ戻る</a>

    <div id="footer-placeholder"></div>

    <script src="../../js/header.js"></script>

</html>
