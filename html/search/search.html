<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サイト内検索 - Bullcon | フジ電機工業株式会社</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/header.css">
    <link rel="stylesheet" href="../../css/footer.css">
    <link rel="stylesheet" href="../../css/search/search.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="search-page-main">
        <div class="container">
            <h2 class="section-title">
                <span class="section-title-en">SEARCH INDEX</span>
                <span class="section-title-jp">サイト内検索</span>
            </h2>
            
            <section class="search-section">
                <form id="search-form" class="search-form">
                    <input type="text" id="search-input" class="search-input" placeholder="キーワードを入力してください (例: 製品、デザイン)">
                    <button type="submit" class="search-button">検索</button>
                </form>
            </section>

            <section class="results-section">
                <h3 class="results-title">検索結果</h3>
                <ul id="results-list" class="results-list">
                    </ul>
                <p id="no-results" class="no-results" style="display: none;">
                    <i class="fas fa-info-circle"></i> 該当するページは見つかりませんでした。別のキーワードをお試しください。
                </p>
            </section>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../../js/header.js"></script>
    <script src="../../js/footer.js"></script>
    <script src="../../js/search/search.js"></script> 
</body>
</html>
