<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bullcon - フジ電機工業株式会社 | カーライフをもっと楽しく、もっと快適に。</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/header.css">
    <link rel="stylesheet" href="./css/footer.css">
    <link rel="stylesheet" href="./css/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="header-placeholder"></div>

<main>
    <section class="hero">
        <div class="hero-slider">
            <div class="slider-item" style="background-image: url('./images/slide_banner/banner_freetving.jpg');">
                <a href="./html/products/TVing/TVing.htm" target="_blank"></a>
            </div>
            <div class="slider-item" style="background-image: url('./images/slide_banner/banner_magicone.jpg');">
                <a href="./html/products/MAGICONE/magicone.htm" target="_blank"></a>
            </div>
            <div class="slider-item" style="background-image: url('./images/slide_banner/banner_dvd.jpg');">
                <a href="./html/products/AV_ACCESSORY/cdv/cdv01.htm" target="_blank"></a>
            </div>
            <div class="slider-item" style="background-image: url('./images/slide_banner/banner_sph.jpg');">
                <a href="./html/products/CAR_ACCESSORY/sph/sph.htm" target="_blank"></a>
            </div>
            <div class="slider-item" style="background-image: url('./images/slide_banner/banner_usb-hdmi.jpg');">
                <a href="./html/products/HDMI_USB/eopspt/eopspt.htm" target="_blank"></a>
            </div>
            <button class="slider-control prev-button"><span>&lt;</span></button>
            <button class="slider-control next-button"><span>&gt;</span></button>
            
        </div>
        <div class="hero-pagination"></div>
    </section>

    <div class="container main-content">

        <section class="news-section">
            <section class="announce-section">
                <h2 class="section-title">
                    <span class="section-title-jp">お知らせ</span>
                </h2>
                <div id="announcements-list" class="announcements-list"></div>
                <div class="news-button-container">
                    <a href="./html/news/announcements.html" class="news-button">一覧はこちら <img src="./images/common/new_window_icon.png" class="new-window-icon"></a>
                </div>
            </section>

            <section class="products-news-section">
                <h2 class="section-title">
                    <span class="section-title-jp">製品新着情報</span>
                </h2>
                <div id="top-products-news-container" class="top-products-news-container">
                    <ul id="top-products-news-list" class="top-products-news-list"></ul>
                </div>
                <div class="news-button-container">
                    <a href="./html/news/products_news.html" class="news-button">一覧はこちら <img src="./images/common/new_window_icon.png" class="new-window-icon"></a>
                </div>
            </section>
        </section>

        <section class="products-section">
            <h2 class="section-title">
                <span class="section-title-jp">製品情報</span>
            </h2>
            
            <div class="products-showcase">
                <a href="./html/products/products.html?category=freeTV" class="products-item">
                    <div class="products-image">
                        <img src="./images/products/free_tving.jpg" alt="Free TVing シリーズ">
                    </div>
                    <div class="products-text-content">
                        <h3>Free TVing シリーズ</h3>
                    </div>
                </a>
                <a href="./html/products/products.html?category=magicone" class="products-item">
                    <div class="products-image">
                        <img src="./images/products/magicone_rear_moniter_unit.jpg" alt="マジコネ シリーズ">
                    </div>
                    <div class="products-text-content">
                        <h3>マジコネ シリーズ</h3>
                    </div>
                </a>
                <a href="./html/products/products.html?category=led_bulb" class="products-item">
                    <div class="products-image">
                        <img src="./images/products/led_headlamp_glorious_d.jpg" alt="LED バルブ/ルームランプ">
                    </div>
                    <div class="products-text-content">
                        <h3>LEDランプ</h3>
                    </div>
                </a>
                <a href="./html/products/products.html?category=av_accessory" class="products-item">
                    <div class="products-image">
                        <img src="./images/products/dvd-cd_player.jpg" alt="AVアクセサリー">
                    </div>
                    <div class="products-text-content">
                        <h3>AVアクセサリー</h3>
                    </div>
                </a>
                <a href="./html/products/products.html?category=car_accessory" class="products-item">
                    <div class="products-image">
                        <img src="./images/products/smart_phone_holder.jpg" alt="カーアクセサリー">
                    </div>
                    <div class="products-text-content">
                        <h3>カーアクセサリー</h3>
                    </div>
                </a>
                <a href="./html/products/products.html?category=camera" class="products-item">
                    <div class="products-image">
                        <img src="./images/products/high_resolution_compact_camera.jpg" alt="カメラ類">
                    </div>
                    <div class="products-text-content">
                        <h3>カメラ類</h3>
                    </div>
                </a>
                <a href="./html/products/products.html?category=monitor" class="products-item">
                    <div class="products-image">
                        <img src="./images/products/on_dash_monitor.jpg" alt="モニター類">
                    </div>
                    <div class="products-text-content">
                        <h3>モニター類</h3>
                    </div>
                </a>
                <a href="./html/products/products.html?category=hdmi_usb" class="products-item">
                    <div class="products-image">
                        <img src="./images/products/hdmi_convert_unit.jpg" alt="USB/HDMI類">
                    </div>
                    <div class="products-text-content">
                        <h3>USB/HDMI関係</h3>
                    </div>
                </a>
                <a href="./html/products/products.html?category=power_supply" class="products-item">
                    <div class="products-image">
                        <img src="./images/products/option_connecter_harnece.jpg" alt="電源関係">
                    </div>
                    <div class="products-text-content">
                        <h3>電源関係</h3>
                    </div>
                </a>
            </div>
            <div class="button-container">
                <a href="./html/products/products.html" class="button">製品一覧を見る</a>
            </div>
        </section>
    </div>
</main>

<div id="footer-placeholder"></div>

<script src="./js/header.js"></script>
<script src="./js/footer.js"></script>
<script src="./js/index_script.js"></script>
<script type="module" src="./js/news/const_data.js"></script>
<script src="./js/news/load_announcements_on_top.js"></script>
<script type="module" src="./js/news/load_products_news_on_top.js"></script>
</body>
</html>
