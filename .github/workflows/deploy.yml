name: Zenlogic Git-FTP Deploy

on:
  push:
    branches:
      - test
      - main

jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Staging (Test)
        uses: git-ftp/git-ftp-action@v0.1.0
        with:
          url: "ftp://${{ secrets.FTP_SERVER }}${{ secrets.STAGING_SERVER_DIR }}"
          user: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          options: "--syncroot . --all-matching" # 👈 これで手動配置したログが100%効きます

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Production (Main)
        uses: git-ftp/git-ftp-action@v0.1.0
        with:
          url: "ftp://${{ secrets.FTP_SERVER }}${{ secrets.PROD_SERVER_DIR }}"
          user: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          options: "--syncroot . --all-matching" # 👈 これで手動配置したログが100%効きます