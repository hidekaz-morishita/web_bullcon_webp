name: Zenlogic Git-FTP Deploy

on:
  push:
    branches:
      - test   # 🟢 testブランチにプッシュされたらテスト環境へ
      - main   # 🔴 mainブランチにプッシュされたら本番環境へ

jobs:
  # ① テスト環境へのデプロイ
  deploy-staging:
    if: github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Staging (Test)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5 # 👈 元の使い慣れたツールに戻します！
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.STAGING_SERVER_DIR }}
          port: 21
          dangerous-clean-slate: true # 👈 【超重要】これを入れると大捜索をパスして数秒で終わります
          exclude: |
            **/.git*
            **/.git*/**
            **/cache/**
            **/wp/**
            **/wp_shop/**
            **/wp_test/**

  # ② 本番環境へのデプロイ
  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Production (Main)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5 # 👈 元の使い慣れたツールに戻します！
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.PROD_SERVER_DIR }}
          port: 21
          dangerous-clean-slate: true # 👈 【超重要】これを入れると大捜索をパスして数秒で終わります
          exclude: |
            **/.git*
            **/.git*/**
            **/cache/**
            **/wp/**
            **/wp_shop/**
            **/wp_test/**
            /web_test/**