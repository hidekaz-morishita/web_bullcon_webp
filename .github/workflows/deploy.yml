name: Zenlogic Direct Deploy

on:
  push:
    branches:
      - main
      - test

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- 1回目：test宛てに飛ばした場合 ---
      - name: Deploy to Staging (Test)
        if: github.ref == 'refs/heads/test'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.STAGING_SERVER_DIR }}
          port: 21
          timeout: 600000
          state-name: .ftp-deploy-sync-state-test.json
          # ⚡ 日付のズレを無視し、ファイルサイズが同じなら「同期済み」とみなす魔法のオプション
          dangerous-clean-by-file-size: true
          exclude: |
            **/.git*
            **/.git*/**
            **/cache/**
            **/wp/**
            **/wp_shop/**
            **/wp_test/**

      # --- 2回目：main宛てに飛ばした場合 ---
      - name: Deploy to Production
        if: github.ref == 'refs/heads/main'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.STAGING_SERVER_DIR }}
          port: 21
          timeout: 600000
          state-name: .ftp-deploy-sync-state-test.json
          # ⚡ 日付のズレを無視し、ファイルサイズが同じなら「同期済み」とみなす魔法のオプション
          dangerous-clean-by-file-size: true
          exclude: |
            **/.git*
            **/.git*/**
            **/cache/**
            **/wp/**
            **/wp_shop/**
            **/wp_test/**