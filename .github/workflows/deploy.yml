name: Zenlogic Git-FTP Deploy (Full Automation)

on:
  push:
    branches:
      - test   # 🟢 testブランチにプッシュされたらテスト環境へデプロイ
      - main   # 🔴 mainブランチにプッシュされたら本番環境へデプロイ

jobs:
  # ==========================================
  # ① テスト環境へのデプロイ（testブランチ用）
  # ==========================================
  deploy-staging:
    if: github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44

      - name: Deploy to Staging (Test)
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          mkdir -p deploy_tmp
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            if [ -f "$file" ]; then
              mkdir -p "deploy_tmp/$(dirname "$file")"
              cp "$file" "deploy_tmp/$file"
            fi
          done

          sudo apt-get update && sudo apt-get install lftp -y
          lftp -c "
          open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ftp://${{ secrets.FTP_SERVER }}
          set ftp:ssl-allow no
          cd ${{ secrets.STAGING_SERVER_DIR }}
          mirror -R deploy_tmp/ .
          quit
          "
          # 自動キャッシュパージ
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
               -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
               -H "Content-Type:application/json" \
               --data '{"purge_everything":true}'

  # ==========================================
  # ② 本番環境へのデプロイ（mainブランチ用）
  # ==========================================
  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44

      - name: Deploy to Production (Main)
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          mkdir -p deploy_tmp
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            if [ -f "$file" ]; then
              mkdir -p "deploy_tmp/$(dirname "$file")"
              cp "$file" "deploy_tmp/$file"
            fi
          done

          sudo apt-get update && sudo apt-get install lftp -y
          lftp -c "
          open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ftp://${{ secrets.FTP_SERVER }}
          set ftp:ssl-allow no
          cd ${{ secrets.PROD_SERVER_DIR }}
          mirror -R deploy_tmp/ .
          quit
          "
          # 自動キャッシュパージ
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
               -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
               -H "Content-Type:application/json" \
               --data '{"purge_everything":true}'