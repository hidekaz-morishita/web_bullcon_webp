name: Zenlogic Git-FTP Deploy (Staging Test Only)

on:
  push:
    branches:
      - test   # 🟢 testブランチにプッシュされた時だけ安全に検証

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. 今回のプッシュで「追加・変更されたファイル」のリストを純粋に調べる
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44

      # 2. その変更されたファイルだけを、FileZillaと同じようにFTPで直接上書きする
      - name: Deploy to Staging (Test)
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: Millby/ftp-action@v1.1.3 # 👈 過去の成否ログを一切読み書きしない純粋ツール
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ${{ secrets.STAGING_SERVER_DIR }}
          file-list: ${{ steps.changed-files.outputs.all_changed_files }}