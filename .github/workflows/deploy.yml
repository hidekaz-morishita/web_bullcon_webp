name: Zenlogic Git-FTP Deploy

on:
  push:
    branches:
      - test

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 過去のGit履歴をすべて読み込む（差分計算に必須）

      - name: Deploy to Staging (Test)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5 # 💡今回だけ、サーバーに「ここが基準だよ」というスタンプ（.git-ftp.log）を爆速で書き込むための身代わり
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.STAGING_SERVER_DIR }}
          port: 21
          state-name: .git-ftp.log
          # 🛑 重い画像やPDF、HTMLを今回は「すべて除外」して、スタンプだけを一瞬で設置する
          exclude: |
            **/*