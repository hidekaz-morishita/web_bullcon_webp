name: Zenlogic Git-FTP Deploy

on:
  push:
    branches:
      - test   # 🟢 testブランチにプッシュされたらテスト環境へ
      - main   # 🔴 mainブランチにプッシュされたら本番環境へ

jobs:
  # ① テスト環境へのデプロイ
  deploy-staging:
    if: github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Staging (Test)
        uses: VitorCanova/git-ftp-action@v1.1.1 # 👈 今度は100%存在する正しいプラグインです
        with:
          url: "ftp://${{ secrets.FTP_SERVER }}${{ secrets.STAGING_SERVER_DIR }}"
          user: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          options: "--all-matching" # 👈 これが生存確認をスキップして差分だけ送る魔法のオプション

  # ② 本番環境へのデプロイ
  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Production (Main)
        uses: VitorCanova/git-ftp-action@v1.1.1 # 👈 今度は100%存在する正しいプラグインです
        with:
          url: "ftp://${{ secrets.FTP_SERVER }}${{ secrets.PROD_SERVER_DIR }}"
          user: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          options: "--all-matching" # 👈 これが生存確認をスキップして差分だけ送る魔法のオプション