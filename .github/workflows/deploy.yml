name: Zenlogic Direct Deploy

on:
  push:
    branches:
      - main
      - test

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- 1回目：test宛てに飛ばした場合 ---
      - name: Deploy to Staging (Test)
        if: github.ref == 'refs/heads/test'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.STAGING_SERVER_DIR }}
          # 🛑 容量が大きすぎるフォルダ・ファイルをすべて完全に除外
          exclude: |
            **/.git*
            **/.git*/**
            **/cache/**
            **/wp/**
            **/wp_shop/**
            **/wp_test/**
            **/pdf/**
            **/images/**

      # --- 2回目：main宛てに飛ばした場合 ---
      - name: Deploy to Production
        if: github.ref == 'refs/heads/main'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.PROD_SERVER_DIR }}
          # 🛑 本番環境用にも同じ除外設定を適用
          exclude: |
            **/.git*
            **/.git*/**
            **/cache/**
            **/wp/**
            **/wp_shop/**
            **/wp_test/**
            **/pdf/**
            **/images/**